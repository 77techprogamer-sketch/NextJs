[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/_next/static/*"
  to = "/.next/static/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.next/server/pages/:splat"
  status = 200
  conditions = {Path = ["/about", "/contact", "/services/*", "/blog/*", "/locations/*"]}